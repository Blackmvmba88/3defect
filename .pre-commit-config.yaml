# Pre-commit hooks configuration for 3defect
# This configuration ensures code quality, format consistency, and security checks
# Run 'pre-commit install' to enable these hooks locally

repos:
  - repo: local
    hooks:
      # Flake8 - Style guide enforcement (linting only, no modifications)
      - id: flake8
        name: flake8
        entry: python3 -m flake8
        language: system
        types: [python]
        args: ['--max-line-length=100', '--extend-ignore=E203,W503']

      # Pytest - Run tests
      - id: pytest
        name: pytest
        entry: python3 -m pytest
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        args: ['tests/', '-q', '--tb=short']
